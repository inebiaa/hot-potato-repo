<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Discover, rate, and review fashion shows from around the world."
    />
    <meta name="theme-color" content="#f8fafc" />
    <link rel="canonical" href="https://www.secretblogger.app/" />

    <meta property="og:site_name" content="Secret Blogger" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Secret Blogger" />
    <meta
      property="og:description"
      content="Discover, rate, and review fashion shows from around the world."
    />
    <meta property="og:url" content="https://www.secretblogger.app/" />
    <meta property="og:image" content="https://www.secretblogger.app/og-default.png" />
    <meta property="og:image:secure_url" content="https://www.secretblogger.app/og-default.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Secret Blogger" />

    <title>Secret Blogger</title>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
