name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          # Root base so /assets/* works from nested /event/<id>/ (static copies for Google). For github.io/<repo>/ only, use VITE_BASE: /<repo>/
          VITE_BASE: '/'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Canonical URLs in Event JSON-LD and sitemap.xml (override if needed).
          VITE_PUBLIC_SITE_URL: https://www.secretblogger.app

      - name: Verify prerendered Event JSON-LD in dist
        run: npm run verify:jsonld
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_SITE_URL: https://www.secretblogger.app

      - name: Assert static site output (sitemap proves prerender ran)
        run: |
          test -f dist/sitemap.xml || { echo "dist/sitemap.xml missing — set VITE_SUPABASE_* secrets"; exit 1; }
          echo "OK: dist/sitemap.xml present"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
